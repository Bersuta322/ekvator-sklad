<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экватор Склад — Вход</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --color-background: #1f2121;
            --color-surface: #262828;
            --color-text: #f5f5f5;
            --color-text-secondary: rgba(167, 169, 169, 0.7);
            --color-primary: #32b8c6;
            --color-primary-hover: #2da6b2;
            --color-error: #ff5459;
            --color-border: rgba(119, 124, 124, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #2b3133 0, #151718 55%, #0c0d0e 100%);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: rgba(21, 23, 24, 0.96);
            border-radius: 18px;
            padding: 28px 24px 24px;
            box-shadow:
                0 24px 60px rgba(0, 0, 0, 0.65),
                0 0 0 1px rgba(255, 255, 255, 0.02);
            border: 1px solid var(--color-border);
            backdrop-filter: blur(18px);
        }

        .card-header {
            margin-bottom: 18px;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
        }

        .title-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-icon {
            font-size: 22px;
            filter: drop-shadow(0 0 10px rgba(50, 184, 198, 0.5));
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
        }

        .description {
            margin-top: 10px;
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.5;
        }

        .description strong {
            color: var(--color-primary);
            font-weight: 600;
        }

        .form-group {
            margin-top: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-text-secondary);
            margin-bottom: 6px;
        }

        input[type="password"] {
            width: 100%;
            padding: 11px 12px;
            border-radius: 10px;
            border: 1px solid rgba(119, 124, 124, 0.6);
            background: rgba(13, 15, 16, 0.9);
            color: var(--color-text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        input[type="password"]::placeholder {
            color: rgba(167, 169, 169, 0.5);
        }

        input[type="password"]:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 1px rgba(50, 184, 198, 0.4);
            background: rgba(13, 15, 16, 0.98);
        }

        .button-row {
            margin-top: 16px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--color-primary);
            color: #020303;
            transition: background 0.18s ease, transform 0.06s ease, box-shadow 0.18s ease;
            box-shadow: 0 10px 28px rgba(50, 184, 198, 0.28);
        }

        button:hover {
            background: var(--color-primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 14px 32px rgba(50, 184, 198, 0.34);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 6px 18px rgba(50, 184, 198, 0.25);
        }

        .hint {
            font-size: 11px;
            color: var(--color-text-secondary);
            margin-top: 6px;
        }

        .status {
            margin-top: 14px;
            font-size: 12px;
            min-height: 18px;
        }

        .status.ok {
            color: #66bb6a;
        }

        .status.error {
            color: var(--color-error);
        }

        .footer {
            margin-top: 18px;
            border-top: 1px solid rgba(119, 124, 124, 0.4);
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--color-text-secondary);
        }

        .badge {
            padding: 3px 9px;
            border-radius: 999px;
            border: 1px solid rgba(119, 124, 124, 0.6);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        @media (max-width: 480px) {
            .card {
                padding: 22px 18px 18px;
            }

            h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <div class="subtitle">Экватор • Склад</div>
            <div class="title-row">
                <div class="title-icon">📦</div>
                <h1>Вход к учёту инвентаря</h1>
            </div>
            <p class="description">
                Доступ только для внутренней команды.  
                Введите служебный пароль, чтобы открыть панель <strong>складского учёта</strong>.
            </p>
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input
                type="password"
                id="password"
                placeholder="Введите пароль"
                autocomplete="current-password"
            />
            <div class="hint">Пароль знаешь только ты (хранится в коде на GitHub).</div>
        </div>

        <div class="button-row">
            <button id="loginButton">
                Войти в Экватор Склад
            </button>
        </div>

        <div class="status" id="status"></div>

        <div class="footer">
            <span class="badge">internal access</span>
            <span>GitHub Pages • static gate</span>
        </div>
    </div>

    <script>
        // Задай свой пароль здесь
        const PASSWORD = 'ekvator2024'; // Можешь поменять на любой

        const passwordInput = document.getElementById('password');
        const statusEl = document.getElementById('status');
        const loginButton = document.getElementById('loginButton');

        function tryLogin() {
            const value = passwordInput.value.trim();

            if (!value) {
                statusEl.textContent = 'Введите пароль';
                statusEl.className = 'status error';
                passwordInput.focus();
                return;
            }

            if (value === PASSWORD) {
                statusEl.textContent = 'Пароль принят, открываю склад...';
                statusEl.className = 'status ok';

                setTimeout(() => {
                    // Перенаправление на страницу склада
                    window.location.href = 'https://bersuta322.github.io/ekvator-sklad/index.html';
                    // если перенесёшь файл в другой путь — поменяй URL выше
                }, 500);
            } else {
                statusEl.textContent = 'Неверный пароль';
                statusEl.className = 'status error';
                passwordInput.select();
            }
        }

        loginButton.addEventListener('click', tryLogin);

        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                tryLogin();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Экватор Склад — учет инвентаря</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--color-background); color: var(--color-text); padding: 20px; }
    :root {
      --color-background: #f5f5f5; --color-surface: #ffffff; --color-text: #1f2121;
      --color-text-secondary: #626c71; --color-primary: #21808d; --color-primary-hover: #1d7480;
      --color-border: rgba(94, 82, 64, 0.2); --color-success: #21808d; --color-warning: #e68161;
      --color-error: #c0152f; --color-red: #ff5459; --color-orange: #ffa726; --color-green: #66bb6a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background: #1f2121; --color-surface: #262828; --color-text: #f5f5f5;
        --color-text-secondary: rgba(167,169,169,0.7); --color-primary: #32b8c6;
        --color-primary-hover: #2da6b2; --color-border: rgba(119,124,124,0.3);
      }
    }
    .container { max-width: 1400px; margin: 0 auto; }
    header { background: var(--color-surface); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h1 { font-size: 28px; margin-bottom: 4px; }
    .header-top { display: flex; gap: 16px; align-items: center; justify-content: space-between; flex-wrap: wrap; }
    .header-text { flex: 1; min-width: 220px; }
    .header-image-wrapper { width: 160px; height: 80px; border-radius: 12px; overflow: hidden; border: 1px solid var(--color-border); cursor: pointer; position: relative; }
    .header-image-wrapper img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .header-image-hint { position: absolute; bottom: 4px; right: 6px; font-size: 10px; background: rgba(0,0,0,0.55); color: #fff; padding: 2px 6px; border-radius: 999px; }
    .tabs { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    .tab { padding: 10px 20px; background: var(--color-border); border: none; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--color-text); transition: all 0.2s; }
    .tab:hover { background: var(--color-primary); color: white; }
    .tab.active { background: var(--color-primary); color: white; }
    .controls { background: var(--color-surface); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    input, select { padding: 10px 15px; border: 1px solid var(--color-border); border-radius: 8px; background: var(--color-background); color: var(--color-text); font-size: 14px; }
    input:focus, select:focus { outline: 2px solid var(--color-primary); border-color: var(--color-primary); }
    .search-input { flex: 1; min-width: 250px; }
    .btn { padding: 10px 20px; background: var(--color-primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.2s; white-space: nowrap; }
    .btn:hover { background: var(--color-primary-hover); }
    .btn-secondary { background: var(--color-border); color: var(--color-text); }
    .btn-secondary:hover { background: var(--color-text-secondary); color: white; }
    .btn-danger { background: #c0152f; color: white; }
    .btn-danger:hover { background: #a01020; }
    .table-wrapper { background: var(--color-surface); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--color-border); position: sticky; top: 0; z-index: 10; }
    th { padding: 15px 10px; text-align: left; font-weight: 600; font-size: 13px; color: var(--color-text); border-bottom: 2px solid var(--color-border); }
    td { padding: 12px 10px; border-bottom: 1px solid var(--color-border); font-size: 14px; }
    tr:hover { background: var(--color-border); }
    tr.selected-row { background: rgba(50,184,198,0.12) !important; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .status-available { background: rgba(102,187,106,0.2); color: var(--color-green); }
    .status-low { background: rgba(255,167,38,0.2); color: var(--color-orange); }
    .status-out { background: rgba(255,84,89,0.2); color: var(--color-red); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: var(--color-surface); padding: 30px; border-radius: 12px; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
    .modal-header { margin-bottom: 20px; }
    .modal-header h2 { font-size: 24px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 14px; }
    .form-group input, .form-group select { width: 100%; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    .summary-card { background: var(--color-surface); padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .summary-card h3 { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 8px; }
    .summary-card .value { font-size: 32px; font-weight: 600; color: var(--color-primary); }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 18px; padding: 5px; margin: 0 2px; border-radius: 4px; transition: background 0.2s; }
    .btn-icon:hover { background: var(--color-border); }
    .editable-cell { cursor: pointer; }
    .editable-cell:hover { background: rgba(33,128,141,0.08); }
    .broken-flag { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }

    /* === BULK ACTION PANEL === */
    .bulk-panel {
      display: none; position: sticky; top: 0; z-index: 20;
      background: var(--color-primary); color: white;
      padding: 12px 20px; border-radius: 10px; margin-bottom: 12px;
      align-items: center; gap: 12px; flex-wrap: wrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .bulk-panel.visible { display: flex; }
    .bulk-panel span { font-weight: 600; font-size: 14px; }
    .bulk-select-wrap { display: flex; flex-direction: column; gap: 3px; min-width: 180px; }
    .bulk-select-wrap label { font-size: 11px; opacity: 0.8; }
    .bulk-select-wrap select, .bulk-select-wrap input { padding: 6px 10px; border-radius: 6px; border: none; font-size: 13px; background: rgba(255,255,255,0.15); color: white; }
    .bulk-select-wrap select option { background: var(--color-surface); color: var(--color-text); }

    /* === COLUMN SETTINGS PANEL === */
    .col-settings-panel {
      display: none; background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: 10px; padding: 16px; margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .col-settings-panel.visible { display: block; }
    .col-settings-panel h4 { margin-bottom: 12px; font-size: 14px; }
    .col-toggles { display: flex; gap: 10px; flex-wrap: wrap; }
    .col-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 6px 12px; background: var(--color-border); border-radius: 20px; cursor: pointer; user-select: none; }
    .col-toggle input { accent-color: var(--color-primary); cursor: pointer; }

    @media (max-width: 768px) {
      .controls { flex-direction: column; align-items: stretch; }
      table { font-size: 12px; }
      th, td { padding: 8px 5px; }
      .header-top { flex-direction: column; align-items: flex-start; }
      .header-image-wrapper { width: 100%; max-width: 260px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-top">
      <div class="header-text">
        <h1>📦 Экватор Склад — учет инвентаря</h1>
        <p style="color:var(--color-text-secondary);margin-top:4px">Система учета инвентаря для мероприятий. Клик по любому полю — редактирование.</p>
      </div>
      <div class="header-image-wrapper" id="headerImageWrapper">
        <img id="headerImage" src="" alt="Изображение склада">
        <span class="header-image-hint">Изменить картинку</span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="main">Основной склад (все)</button>
      <button class="tab" data-tab="flags">Флаги и виндеры</button>
      <button class="tab" data-tab="tablecloths">Скатерти</button>
      <button class="tab" data-tab="vests">Манишки</button>
      <button class="tab" data-tab="journal">Журнал движения</button>
    </div>
  </header>

  <div class="summary">
    <div class="summary-card"><h3>Всего позиций</h3><div class="value" id="totalItems">0</div></div>
    <div class="summary-card"><h3>В эксплуатации</h3><div class="value" id="inUse">0</div></div>
    <div class="summary-card"><h3>На складе</h3><div class="value" id="inStock">0</div></div>
    <div class="summary-card"><h3>Сломано</h3><div class="value" id="broken" style="color:var(--color-red)">0</div></div>
  </div>

  <div class="controls">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск по категории, подгруппе и названию...">
    <select id="categoryFilter"><option value="">Все категории</option></select>
    <button class="btn" id="addMovementBtn">➕ Добавить движение</button>
    <button class="btn btn-secondary" id="colSettingsBtn">⚙ Столбцы</button>
    <button class="btn btn-secondary" id="exportBtn">📥 Экспорт в Excel</button>
  </div>

  <!-- Настройка столбцов -->
  <div class="col-settings-panel" id="colSettingsPanel">
    <h4>Показывать столбцы:</h4>
    <div class="col-toggles" id="colToggles"></div>
  </div>

  <!-- Панель массового редактирования -->
  <div class="bulk-panel" id="bulkPanel">
    <span id="bulkCount">0 выбрано</span>
    <div class="bulk-select-wrap">
      abel>Поле для изменения</label>
      <select id="bulkField">
        <option value="">— выберите поле —</option>
        <option value="inUse">В эксплуатации</option>
        <option value="broken">Сломано</option>
        <option value="repair">На ремонте</option>
        <option value="total">Всего (количество)</option>
        <option value="notes">Примечания</option>
        <option value="category">Категория</option>
        <option value="subCategory">Подгруппа</option>
      </select>
    </div>
    <div class="bulk-select-wrap">
      abel>Новое значение</label>
      <input type

            {category: "Спортивное оборудование", subCategory: "Блины", name: "Блины 15 кг", total: 13, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},

            {category: "Спортивное оборудование", subCategory: "Гири", name: "Гири 16 кг", total: 5, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Спортивное оборудование", subCategory: "Инвентарь", name: "Удочки", total: 84, inUse: 0, broken: 0, repair: 0, notes: "84-100 можно собрать", status: "В наличии"},
            {category: "Безопасность", subCategory: "Огнетушители", name: "Огнетушители", total: 21, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Связь", subCategory: "Рации", name: "Рации", total: 14, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},

            {category: "Флаги и виндеры", subCategory: "ТР (крас/бел/син)", name: "ТР виндеры (красный, белый, синий)", total: 68, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Флаги и виндеры", subCategory: "ТР с рисунком", name: "ТР виндеры игры (с рисунком)", total: 65, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Флаги и виндеры", subCategory: "Ростех", name: "Ростех", total: 24, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Флаги и виндеры", subCategory: "АРКС", name: "АРКС зеленые", total: 19, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Флаги и виндеры", subCategory: "Государственные", name: "Флаг России", total: 5, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"}

        tablecloths: [
            {category: "Скатерти", subCategory: "ТР цветная", name: "ТР скатерть цветная", total: 15, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Скатерти", subCategory: "ТР синяя", name: "ТР скатерть синяя", total: 12, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Скатерти", subCategory: "Черная", name: "Черная скатерть", total: 33, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Скатерти", subCategory: "АРКС", name: "Скатерть АРКС", total: 32, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"}
        ],
        vests: [
            {category: "Манишки", subCategory: "Персонал", name: "Персонал красный атлас", total: 42, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Манишки", subCategory: "Судья", name: "Судья синий атлас", total: 150, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Манишки", subCategory: "STAFF", name: "Красные STAFF", total: 47, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"},
            {category: "Манишки", subCategory: "Двухсторонние", name: "Голубая-салатовая двухсторонняя", total: 70, inUse: 0, broken: 0, repair: 0, notes: "", status: "В наличии"}
        ]
    };

    let journal = [];
    let currentTab = 'main';

    function getAllItems() {
        return [
            ...inventory.main,
            ...inventory.flags,
            ...inventory.tablecloths,
            ...inventory.vests
        ];
    }

    function findItemByName(name) {
        const arrays = [
            inventory.main,
            inventory.flags,
            inventory.tablecloths,
            inventory.vests
        ];
        for (const arr of arrays) {
            const found = arr.find(i => i.name === name);
            if (found) return found;
        }
        return null;
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const theadRow = document.querySelector('#inventoryTable thead tr');

        if (currentTab !== 'journal' && theadRow.children.length !== 11) {
            theadRow.innerHTML = `
                <th>Категория</th>
                <th>Подгруппа</th>
                <th>Наименование</th>
                <th>Всего</th>
                <th>В эксплуатации</th>
                <th>На складе</th>
                <th>Сломано</th>
                <th>На ремонте</th>
                <th>Статус</th>
                <th>Примечания / Сломано</th>
                <th>Действия</th>
            `;
        }

        tbody.innerHTML = '';

        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const categoryFilter = document.getElementById('categoryFilter').value;

        const filtered = data.filter(item => {
            const haystack = `${item.category || ''} ${item.subCategory || ''} ${item.name}`.toLowerCase();
            const matchesSearch = haystack.includes(searchTerm);
            const matchesCategory = !categoryFilter || item.category === categoryFilter;
            return matchesSearch && matchesCategory;
        });

        filtered.forEach(item => {
            const available = item.total - item.inUse;
            const status = item.status || 'В наличии';

            let statusClass = 'status-available';
            let statusText = 'В наличии';

            if (status === 'В наличии') {
                statusClass = 'status-available';
                statusText = 'В наличии';
            } else if (status === 'Не хватает') {
                statusClass = 'status-low';
                statusText = 'Не хватает';
            } else if (status === 'Нужно закупить') {
                statusClass = 'status-out';
                statusText = 'Нужно закупить';
            }

            const isBrokenFlag = false; // галочка теперь не трогает примечания
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="editable-cell" onclick="editTextField('${item.name}', 'category')">${item.category || '-'}</td>
                <td class="editable-cell" onclick="editTextField('${item.name}', 'subCategory')">${item.subCategory || '-'}</td>
                <td class="editable-cell" onclick="editTextField('${item.name}', 'name')"><strong>${item.name}</strong></td>
                <td class="editable-cell" onclick="editNumberField('${item.name}', 'total')">${item.total}</td>
                <td class="editable-cell" onclick="editNumberField('${item.name}', 'inUse')">${item.inUse}</td>
                <td>${available}</td>
                <td class="editable-cell" onclick="editNumberField('${item.name}', 'broken')">${item.broken}</td>
                <td class="editable-cell" onclick="editNumberField('${item.name}', 'repair')">${item.repair}</td>
                <td>
                    <span class="status-badge ${statusClass}">
                        ${statusText}
                    </span>
                    <br>
                    <select onchange="changeStatus('${item.name}', this.value)">
                        <option value="В наличии" ${status === 'В наличии' ? 'selected' : ''}>В наличии</option>
                        <option value="Не хватает" ${status === 'Не хватает' ? 'selected' : ''}>Не хватает</option>
                        <option value="Нужно закупить" ${status === 'Нужно закупить' ? 'selected' : ''}>Нужно закупить</option>
                    </select>
                </td>
                <td>
                    <div class="editable-cell" onclick="editTextField('${item.name}', 'notes')">
                        ${item.notes || '-'}
                    </div>
                    <label class="broken-flag">
                        <input type="checkbox" ${isBrokenFlag ? 'checked' : ''} onchange="toggleBrokenFlag('${item.name}', this.checked)">
                        сломано
                    </label>
                </td>
                <td>
                    <button class="btn-icon" onclick="quickAdd('${item.name}')" title="Добавить">➕</button>
                    <button class="btn-icon" onclick="quickRemove('${item.name}')" title="Уменьшить">➖</button>
                </td>
            `;
            tbody.appendChild(row);
        });

        updateSummary(data);
    }

    function updateSummary(data) {
        const totalItems = data.reduce((sum, item) => sum + item.total, 0);
        const inUse = data.reduce((sum, item) => sum + item.inUse, 0);
        const inStock = data.reduce((sum, item) => sum + (item.total - item.inUse), 0);
        const broken = data.reduce((sum, item) => sum + item.broken, 0);

        document.getElementById('totalItems').textContent = totalItems;
        document.getElementById('inUse').textContent = inUse;
        document.getElementById('inStock').textContent = inStock;
        document.getElementById('broken').textContent = broken;
    }

    function populateCategories() {
        const allItems = getAllItems();
        const categories = [...new Set(allItems.map(item => item.category))];
        const select = document.getElementById('categoryFilter');
        select.innerHTML = '<option value="">Все категории</option>';
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });
    }

    function populateItemSelect() {
        const select = document.getElementById('itemName');
        select.innerHTML = '<option value="">Выберите товар</option>';
        
        const currentData = currentTab === 'main' ? getAllItems() : inventory[currentTab];
        currentData.forEach(item => {
            const option = document.createElement('option');
            option.value = item.name;
            option.textContent = item.name;
            select.appendChild(option);
        });
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.dataset.tab;
            
            if (currentTab === 'journal') {
                renderJournal();
            } else if (currentTab === 'main') {
                renderTable(getAllItems());
            } else {
                renderTable(inventory[currentTab]);
            }
        });
    });

    document.getElementById('searchInput').addEventListener('input', () => {
        const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
        renderTable(data);
    });

    document.getElementById('categoryFilter').addEventListener('change', () => {
        const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
        renderTable(data);
    });

    document.getElementById('addMovementBtn').addEventListener('click', () => {
        populateItemSelect();
        document.getElementById('movementModal').classList.add('active');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
        document.getElementById('movementModal').classList.remove('active');
        document.getElementById('movementForm').reset();
    });

    document.getElementById('movementForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const operation = document.getElementById('operationType').value;
        const itemName = document.getElementById('itemName').value;
        const quantity = parseInt(document.getElementById('quantity').value);
        const person = document.getElementById('person').value;
        const responsible = document.getElementById('responsible').value;
        const event = document.getElementById('event').value;
        const notes = document.getElementById('notes').value;

        const item = findItemByName(itemName);
        
        if (item) {
            if (operation === 'Выдача') {
                item.inUse += quantity;
            } else {
                item.inUse = Math.max(0, item.inUse - quantity);
            }

            journal.push({
                date: new Date().toLocaleDateString('ru-RU'),
                time: new Date().toLocaleTimeString('ru-RU'),
                operation,
                item: itemName,
                quantity,
                person,
                responsible,
                event,
                notes
            });

            const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
            renderTable(data);
            document.getElementById('movementModal').classList.remove('active');
            document.getElementById('movementForm').reset();
        }
    });

    function renderJournal() {
        const tbody = document.getElementById('tableBody');
        const thead = document.querySelector('#inventoryTable thead tr');
        
        thead.innerHTML = `
            <th>Дата</th>
            <th>Время</th>
            <th>Операция</th>
            <th>Наименование</th>
            <th>Количество</th>
            <th>Кому выдано / От кого</th>
            <th>Ответственный</th>
            <th>Мероприятие</th>
            <th>Примечания</th>
        `;

        tbody.innerHTML = '';
        
        journal.slice().reverse().forEach(entry => {
            const row = document.createElement('tr');
            const opClass = entry.operation === 'Выдача' ? 'status-out' : 'status-available';
            row.innerHTML = `
                <td>${entry.date}</td>
                <td>${entry.time}</td>
                <td><span class="status-badge ${opClass}">${entry.operation}</span></td>
                <td><strong>${entry.item}</strong></td>
                <td>${entry.quantity}</td>
                <td>${entry.person}</td>
                <td>${entry.responsible}</td>
                <td>${entry.event}</td>
                <td>${entry.notes}</td>
            `;
            tbody.appendChild(row);
        });

        if (journal.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 40px; color: var(--color-text-secondary);">Журнал движения пуст</td></tr>';
        }
    }

    document.getElementById('exportBtn').addEventListener('click', () => {
        alert('Функция экспорта в Excel будет добавлена позже');
    });

    // Редактирование чисел
    window.editNumberField = function(itemName, field) {
        const item = findItemByName(itemName);
        if (!item) return;

        const labels = {
            total: 'Всего',
            inUse: 'В эксплуатации',
            broken: 'Сломано',
            repair: 'На ремонте'
        };
        const label = labels[field] || field;
        const currentValue = item[field] ?? 0;

        const input = prompt(`${item.name}\n${label}:`, currentValue);
        if (input === null) return;
        if (input.trim() === '' || isNaN(input)) return;

        const value = Math.max(0, parseInt(input, 10));
        item[field] = value;

        const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
        renderTable(data);
    };

    // Редактирование текстовых полей
    window.editTextField = function(itemName, field) {
        const item = findItemByName(itemName);
        if (!item) return;

        const labels = {
            category: 'Категория',
            subCategory: 'Подгруппа',
            name: 'Наименование',
            notes: 'Примечания'
        };
        const label = labels[field] || field;
        const currentValue = item[field] ?? '';

        const input = prompt(`${item.name}\n${label}:`, currentValue);
        if (input === null) return;

        item[field] = input.trim();

        const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
        renderTable(data);
    };

    // Быстро добавить / уменьшить количество
    window.quickAdd = function(itemName) {
        const item = findItemByName(itemName);
        if (!item) return;

        const quantity = prompt(`Добавить количество для "${item.name}":`, '1');
        if (quantity !== null && !isNaN(quantity)) {
            const amount = parseInt(quantity, 10);
            item.total += amount;
            const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
            renderTable(data);
        }
    };

    window.quickRemove = function(itemName) {
        const item = findItemByName(itemName);
        if (!item) return;

        const quantity = prompt(`Уменьшить количество для "${item.name}":`, '1');
        if (quantity !== null && !isNaN(quantity)) {
            const amount = parseInt(quantity, 10);
            item.total = Math.max(0, item.total - amount);
            const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
            renderTable(data);
        }
    };

    // Галочка "сломано" — только число "сломано", примечание не трогаем
    window.toggleBrokenFlag = function(itemName, checked) {
        const item = findItemByName(itemName);
        if (!item) return;

        if (checked && item.broken === 0) {
            item.broken = 1;
        } else if (!checked && item.broken > 0) {
            item.broken = item.broken; // дальше можно руками менять
        }

        const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
        renderTable(data);
    };

    // Изменение статуса
    window.changeStatus = function(itemName, newStatus) {
        const item = findItemByName(itemName);
        if (!item) return;
        item.status = newStatus;
        const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
        renderTable(data);
    };

    // Картинка в шапке с сохранением в localStorage
    const headerImage = document.getElementById('headerImage');
    const HEADER_IMAGE_KEY = 'ekvatorHeaderImageUrl';
    const defaultHeaderImage = 'https://images.pexels.com/photos/4484078/pexels-photo-4484078.jpeg?auto=compress&cs=tinysrgb&w=1200';

    function loadHeaderImage() {
        const saved = localStorage.getItem(HEADER_IMAGE_KEY);
        headerImage.src = saved || defaultHeaderImage;
    }

    document.getElementById('headerImageWrapper')?.addEventListener('click', () => {
        const current = headerImage.src;
        const input = prompt('Вставьте URL новой картинки для шапки склада:', current || defaultHeaderImage);
        if (!input) return;
        headerImage.src = input;
        try {
            localStorage.setItem(HEADER_IMAGE_KEY, input);
        } catch(e) {}
    });

    // Кнопка "Добавить товар"
    const addItemBtn = document.getElementById('addItemBtn');
    if (addItemBtn) {
        addItemBtn.addEventListener('click', () => {
            const category = prompt('Категория (например: Мебель, Спортивное оборудование):', '');
            if (category === null || category.trim() === '') return;

            const subCategory = prompt('Подгруппа (например: Стулья, Столы):', '');
            if (subCategory === null) return;

            const name = prompt('Наименование товара:', '');
            if (name === null || name.trim() === '') return;

            const totalStr = prompt('Количество всего:', '0');
            if (totalStr === null || isNaN(totalStr)) return;
            const total = Math.max(0, parseInt(totalStr, 10));

            const newItem = {
                category: category.trim(),
                subCategory: subCategory.trim() || '',
                name: name.trim(),
                total,
                inUse: 0,
                broken: 0,
                repair: 0,
                notes: '',
                status: 'В наличии'
            };

            inventory.main.push(newItem);
            populateCategories();
            const data = currentTab === 'main' ? getAllItems() : inventory[currentTab];
            renderTable(data);
        });
    }

    // Инициализация
    loadHeaderImage();
    populateCategories();
    renderTable(getAllItems());
</script>
